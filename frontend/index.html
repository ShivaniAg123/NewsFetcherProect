<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>News Fetcher</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>
<body>
  <!-- ===== TOP BAR ===== -->
  <div class="top-bar">
    <h1>News Fetcher</h1>
    <div class="auth-buttons">
      <button class="auth-btn" id="loginBtn" onclick="openModal('login')">Login</button>

      <button class="auth-btn" id="signupBtn" onclick="openModal('signup')">Signup</button>
      <button class="auth-btn" id="logoutBtn" style="display:none;" onclick="logoutUser()">Logout</button>

      <button id="darkMode" class="toggle-btn" onclick="toggleDarkMode()">🌙</button>
    </div>
  </div>
  <!-- ===== HERO SECTION ===== -->
  <div class="hero">
    <h1>📰 Stay Updated!</h1>
    <p>Select your country and category to get the latest news instantly.</p>
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="News Icon" class="hero-icon">
  </div>
  <!-- ===== FORM SECTION ===== -->
  <div class="form-container">
    <div class="horizontal-scroll">
      <select id="country">
        <option value="af">Afghanistan</option>
        <option value="be">Belgium</option>
        <option value="br">Brazil</option>
        <option value="ca">Canada</option>
        <option value="cn">China</option>
        <option value="de">Germany</option>
        <option value="in">India</option>
        <option value="iq">Iraq</option>
        <option value="jp">Japan</option>
        <option value="mx">Mexico</option>
        <option value="pk">Pakistan</option>
        <option value="sg">Singapore</option>
        <option value="us">United States</option>
      </select>
      <select id="category">
        <option value="top">Top</option>
        <option value="business">Business</option>
        <option value="sports">Sports</option>
        <option value="technology">Technology</option>
        <option value="entertainment">Entertainment</option>
        <option value="health">Health</option>
        <option value="crime">Crime</option>
        <option value="domestic">Domestic</option>
        <option value="education">Education</option>
        <option value="food">Food</option>
        <option value="environment">Environment</option>
      </select>
    </div>
    <button class="fetch-btn" onclick="fetchNews()">Get News</button>
  </div>
  <!-- ===== LOADING SPINNER ===== -->
  <div id="loading">
    <div class="spinner"></div>
    <p>Fetching latest news...</p>
  </div>
  <!-- ===== NEWS CARDS ===== -->
  <div class="news-section" id="news"></div>
  <!-- ===== LOGIN MODAL ===== -->
  <div id="loginModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('login')">&times;</span>
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="loginUser()">Login</button>
    </div>
  </div>
<!-- ===== SIGNUP MODAL ===== -->
  <div id="signupModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="closeModal('signup')">&times;</span>
      <h2>Signup</h2>
      <input type="text" id="signupName" placeholder="Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password">
      <button onclick="signupUser()">Signup</button>
    </div>
  </div>
</body>
</html>
